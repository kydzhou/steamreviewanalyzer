<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>工具导航</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: "Microsoft YaHei UI", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: #0f172a;
        color: #e5e7eb;
      }
      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 48px 18px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 32px;
      }
      p {
        color: #9ca3af;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 18px;
        margin-top: 28px;
      }
      a.card {
        display: block;
        padding: 22px;
        border: 1px solid #263244;
        border-radius: 16px;
        background: #111827;
        color: inherit;
        text-decoration: none;
        box-shadow: 0 16px 40px rgb(0 0 0 / 0.22);
      }
      a.card:hover {
        border-color: #60a5fa;
      }
      .title {
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 8px;
      }
      .desc {
        color: #9ca3af;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>工具导航</h1>
      <p>这台服务器上的工具入口会集中放在这里。</p>

      <section class="grid">
        <a class="card" href="/steam-review/">
          <div class="title">Steam 评价中文分析工具</div>
          <div class="desc">输入 Steam 游戏链接或 App ID，抓取所有语言用户评价，并总结优点和缺点。</div>
        </a>
      </section>
    </main>
  </body>
</html>
